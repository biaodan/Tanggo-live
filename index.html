<!DOCTYPE html>
<html lang="th" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>รับสมัครผู้จัดการร้านค้าพาร์ทไทม์ - Yunchuang Warehouse Trading</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans Thai', sans-serif; }
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: linear-gradient(to bottom, #10b981, #14b8a6); border-radius: 5px; }
    </style>
</head>
<body class="bg-emerald-50 min-h-screen text-gray-900">

    <div id="root"></div>

    <script type="module">
        import React, { useState, useEffect } from 'https://esm.sh/react@18.2.0';
        import ReactDOM from 'https://esm.sh/react-dom@18.2.0/client';
        import * as Icons from 'https://esm.sh/lucide-react@0.344.0';

        function App() {
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            const [scrollY, setScrollY] = useState(0);

            useEffect(() => {
                const handleScroll = () => setScrollY(window.scrollY);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const openLine = () => window.open('https://line.me/ti/p/~@yourlineid', '_blank');

            // 这里放你刚才 App.tsx 里的逻辑...
            return (
                <div className="min-h-screen bg-gradient-to-b from-emerald-50 via-white to-teal-50">
                    <nav className={`fixed top-0 w-full z-50 transition-all ${scrollY > 50 ? 'bg-white/95 shadow-lg' : 'bg-transparent'}`}>
                        <div className="max-w-7xl mx-auto px-6 h-20 flex justify-between items-center">
                            <div className="font-bold text-xl flex items-center gap-2"><Icons.Package className="text-emerald-600" /> Yunchuang</div>
                            <button onClick={openLine} className="px-6 py-2 bg-[#00B900] text-white rounded-full font-bold flex items-center gap-2">
                                <Icons.MessageCircle className="w-5 h-5" /> ติดต่อ LINE
                            </button>
                        </div>
                    </nav>

                    <section className="pt-40 pb-20 text-center px-4">
                        <h1 className="text-4xl md:text-6xl font-bold mb-6">รับสมัคร <span className="text-emerald-600">ผู้จัดการร้านค้า</span></h1>
                        <div className="bg-gradient-to-r from-emerald-500 to-teal-500 text-white rounded-2xl p-8 shadow-xl inline-block mb-10">
                            <p className="text-lg opacity-90">รายได้ต่อวัน</p>
                            <p className="text-5xl md:text-6xl font-bold">1,000 - 7,000 <span className="text-2xl">บาท/วัน</span></p>
                        </div>
                        <p className="text-xl text-gray-600 mb-10">ไม่ต้องมีประสบการณ์ ฝึกอบรมฟรี ทำงานที่บ้านได้ง่ายๆ</p>
                        <button onClick={openLine} className="px-10 py-4 bg-[#00B900] text-white text-lg font-bold rounded-2xl hover:bg-green-700 transition">ติดต่อเราผ่าน LINE</button>
                    </section>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
    </script>
</body>
</html>
